<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PoC</title>
</head>
<body>
  <div id="result">Starting test...</div>

  <script>
    function log(message) {
      const result = document.getElementById("result");
      result.innerHTML += "<br>" + message;
      console.log(message);
    }

    function attemptPhoneCall() {
      const phone = "tel:1234567890";

      try {
        log("Attempting phone call: " + phone);
        window.location.href = phone;
      } catch (e) {
        log("Phone call error: " + e.message);
      }
    }

    function attemptSMS() {
      const sms = "sms:1234567890";

      try {
        log("Attempting SMS: " + sms);
        window.location.href = sms;
      } catch (e) {
        log("SMS error: " + e.message);
      }
    }

    function runTest() {
      log("=== Starting Test ===");
      log("Timestamp: " + new Date().toISOString());

      log("--- Attempting Phone Call ---");
      attemptPhoneCall();

      log("--- Attempting SMS ---");
      attemptSMS();

      log("=== Finished ===");
    }

    window.onload = runTest;
  </script>
</body>
</html>
